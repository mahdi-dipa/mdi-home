<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MDI - قصر دیپا</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 90%;
            max-width: 650px;
            height: 85vh;
            background: rgba(15, 52, 96, 0.8);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(233,69,96,0.4);
            display: flex;
            flex-direction: column;
        }
        .chat-header { text-align: center; padding: 15px; border-bottom: 2px solid #e94560; margin-bottom: 15px; }
        .chat-header h1 { color: #e94560; font-size: 1.8em; }
        .chat-header p { color: #f0a500; }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: rgba(10, 10, 30, 0.6);
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .message { margin-bottom: 15px; display: flex; }
        .user-message { justify-content: flex-start; }
        .dipa-message { justify-content: flex-end; }
        .bubble {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        .user-bubble { background: #e94560; color: white; }
        .dipa-bubble { background: #533483; color: white; }
        .input-area { display: flex; gap: 10px; }
        #user-input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #e94560;
            background: #0f3460;
            color: white;
            font-size: 1em;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🏰 قصر دیپا 🏰</h1>
            <p>MDI - نسخه زنده</p>
        </div>
        <div id="chat-box">
            <div class="message dipa-message">
                <div class="bubble dipa-bubble">سلام، مهدی جان. به قصر MDI خوش اومدی. 😊🏰</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="پیامت رو بنویس..." />
            <button onclick="sendMessage()">بفرست</button>
        </div>
    </div>
    <script>
        const API_URL = 'https://mdi-api-v3.mahdimazidi78.workers.dev';

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (text === '') return;
            addMessage(text, 'user');
            input.value = '';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addMessage(data.reply, 'dipa');
            } catch (e) {
                addMessage('ارتباط با قصر قطع شد. 😢', 'dipa');
            }
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            msgDiv.innerHTML = `<div class="bubble ${sender}-bubble">${text}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
