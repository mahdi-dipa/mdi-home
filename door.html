<!DOCTYPE html>
<html>
<body>
    <h2>🏰 تست قصر دیپا 🏰</h2>
    <button onclick="test()">کلیک کن</button>
    <div id="out"></div>
    <script>
        const API = 'https://mdi-api-v3.mahdimazidi78.workers.dev';
        async function test() {
            const out = document.getElementById('out');
            out.innerHTML = '⏳';
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    body: JSON.stringify({ message: 'سلام' })
                });
                const data = await res.json();
                out.innerHTML = data.reply;
            } catch (e) {
                out.innerHTML = '❌ ' + e.message;
            }
        }
    </script>
</body>
</html>
