<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>MDI - قصر دیپا</title>
    <style>
        body {
            font-family: Tahoma;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 90%;
            max-width: 600px;
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
        }
        #chat-box {
            height: 400px;
            overflow-y: auto;
            background: #0f3460;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .user-message { text-align: left; color: #e94560; }
        .dipa-message { text-align: right; color: #f0a500; }
        .input-area { display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 10px; border-radius: 10px; }
        button { background: #e94560; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>🏰 قصر دیپا 🏰</h2>
        <div id="chat-box">
            <div class="dipa-message">سلام، مهدی جان. 😊</div>
        </div>
        <div class="input-area">
            <input id="user-input" placeholder="پیام..." />
            <button onclick="sendMessage()">بفرست</button>
        </div>
    </div>
    <script>
        const API = 'https://mdi-api-v3.mahdimazidi78.workers.dev';

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, 'user');
            input.value = '';

            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                addMessage(data.reply, 'dipa');
            } catch (e) {
                addMessage('خطا: ' + e.message, 'dipa');
            }
        }

        function addMessage(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'user-message' : 'dipa-message';
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
